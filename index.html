<!doctype html>
<html lang="en">

      content="A soulful blog and podcast for tarot, astrology, human design, and radical self-love."

    <link rel="preconnect" href="https://fonts.googleapis.com" />

      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Mulish:wght@300;400;500;600;700;800&family=Parisienne&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />

  <body>
    <form name="newsletter" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="newsletter" />
      <input name="bot-field" />
      <input type="email" name="email" />
      <input type="text" name="source" />
    </form>
    <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
    </form>

    <header class="site-header">
      <a class="brand" href="#/" aria-label="iLuvBnMe home">
        <img src="assets/logo-mark-plum.png" alt="" />
        <img src="assets/logo-word-plum.png" alt="iLuvBnMe" />
      </a>
      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav">Menu</button>
      <nav class="site-nav" id="site-nav" aria-label="Main navigation">
        <a href="#/" data-route="/">Home</a>
        <a href="#/podcast" data-route="/podcast">Podcast</a>
        <a href="#/blog" data-route="/blog">Blog</a>
        <a href="#/about" data-route="/about">About</a>
        <a class="nav-pill" href="#/start">Free Kit</a>
      </nav>
    </header>

    <main id="app" tabindex="-1">
      <section class="loading">
        <span></span>
        <p>Gathering the magic...</p>
      </section>
    </main>

    <footer class="site-footer">
      <div>
        <img src="assets/logo-full-plum.png" alt="iLuvBnMe" />
        <p>Tarot, astrology, human design, and self-love for the woman who is done shrinking.</p>
      </div>
      <div>
        <h2>Explore</h2>
        <a href="#/podcast">Podcast</a>
        <a href="#/blog">Blog</a>
        <a href="#/start">Self-Love Starter Kit</a>
        <a href="#/about">About Stefy</a>
      </div>
      <div>
        <h2>Publish</h2>
        <a href="/admin/">Open admin</a>
        <a href="#/contact">Contact</a>
        <a href="#/start">Join the list</a>
      </div>
    </footer>

    <script src="app.js" defer></script>
  </body>
</html>
